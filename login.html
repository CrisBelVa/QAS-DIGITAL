<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QAS-Digital | Login</title>
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0B1120;
      --navy-mid: #0F1729;
      --navy-light: #1A2440;
      --teal: #00D4B1;
      --teal-dark: #00B89A;
      --teal-glow: rgba(0, 212, 177, 0.18);
      --teal-subtle: rgba(0, 212, 177, 0.08);
      --white: #F0F4FF;
      --muted: #8892A4;
      --border: rgba(255, 255, 255, 0.07);
      --red: #FF4C6A;
      --font-head: 'Bricolage Grotesque', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--navy);
      font-family: var(--font-body);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,177,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,177,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .blob-1 {
      width: 400px; height: 400px;
      background: rgba(0,212,177,0.07);
      top: -100px; left: -100px;
    }
    .blob-2 {
      width: 300px; height: 300px;
      background: rgba(0,212,177,0.05);
      bottom: -80px; right: -80px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo-area {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-area img {
      height: 48px;
      margin-bottom: 16px;
    }
    .logo-text {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }
    .logo-text span { color: var(--teal); }
    .logo-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Card */
    .card {
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    .card-title {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--muted);
      pointer-events: none;
    }

    .field input {
      width: 100%;
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 12px 42px;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: var(--muted); }
    .field input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-glow);
    }

    /* Eye toggle */
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding: 4px;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--white); }
    .eye-btn svg { width: 16px; height: 16px; }

    /* Role selector */
    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    .role-btn {
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .role-btn .role-icon {
      font-size: 20px;
      margin-bottom: 4px;
    }
    .role-btn .role-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      font-family: var(--font-body);
    }
    .role-btn.active {
      border-color: var(--teal);
      background: var(--teal-subtle);
    }
    .role-btn.active .role-label { color: var(--teal); }

    /* Error */
    .error-msg {
      background: rgba(255,76,106,0.1);
      border: 1px solid rgba(255,76,106,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 18px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-msg svg { width: 15px; height: 15px; flex-shrink: 0; }
    .error-msg.show { display: flex; }

    /* Submit */
    .btn-login {
      width: 100%;
      background: var(--teal);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover {
      background: var(--teal-dark);
      box-shadow: 0 8px 24px rgba(0,212,177,0.25);
    }
    .btn-login:active { transform: scale(0.98); }
    .btn-login svg { width: 16px; height: 16px; }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 20px;
    }
    .footer-note a {
      color: var(--teal);
      text-decoration: none;
    }

    /* Shake animation */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.4s ease; }

    /* Loading spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(11,17,32,0.3);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .loading .spinner { display: block; }
    .loading .btn-text { display: none; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-wrapper">
    <div class="logo-area">
      <div class="logo-text">QAS<span>-Digital</span></div>
      <div class="logo-sub">Plataforma de Gestão Integrada · SST</div>
    </div>

    <div class="card">
      <div class="card-title">Bem-vindo de volta</div>
      <div class="card-sub">Aceda à sua conta para continuar</div>

      <!-- Role selector -->
      <div class="role-selector">
        <button class="role-btn active" data-role="admin" onclick="selectRole(this)">
          <div class="role-icon">🛡️</div>
          <div class="role-label">Administrador</div>
        </button>
        <button class="role-btn" data-role="employee" onclick="selectRole(this)">
          <div class="role-icon">👤</div>
          <div class="role-label">Colaborador</div>
        </button>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
        <div class="field">
          <label for="username">Utilizador</label>
          <div class="input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="username" placeholder="ex: Admin" autocomplete="username" />
          </div>
        </div>

        <div class="field">
          <label for="password">Palavra-passe</label>
          <div class="input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="eye-btn" onclick="togglePassword()">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="error-msg" id="errorMsg">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <span id="errorText">Utilizador ou palavra-passe incorretos.</span>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <div class="spinner"></div>
          <span class="btn-text" style="display:flex;align-items:center;gap:8px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Entrar
          </span>
        </button>
      </form>

      <div class="footer-note">
        Problemas de acesso? <a href="#">Contacte o administrador</a>
      </div>
    </div>
  </div>

  <script>
    let selectedRole = 'admin';

    function selectRole(btn) {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedRole = btn.dataset.role;
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');

      errorMsg.classList.remove('show');

      // Credentials check
      const credentials = {
        admin: { user: 'Admin', pass: 'Admin123' },
        employee: { user: 'Colaborador', pass: 'Colab2024' }
      };

      const cred = credentials[selectedRole];
      if (username === cred.user && password === cred.pass) {
        // Show loading
        btn.classList.add('loading');
        btn.querySelector('.btn-text').style.display = 'none';
        btn.querySelector('.spinner').style.display = 'block';

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 900);
      } else {
        errorText.textContent = selectedRole === 'admin'
          ? 'Utilizador ou palavra-passe incorretos.'
          : 'Credenciais de colaborador inválidas.';
        errorMsg.classList.add('show');
        document.getElementById('loginForm').classList.add('shake');
        setTimeout(() => document.getElementById('loginForm').classList.remove('shake'), 400);
      }
    }
  </script>
</body>
</html>
